name: Release Rust

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/check.yml

  publish:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: crates-io-${{ hashFiles('Cargo.lock') }}
          restore-keys: crates-io-
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          publish() {
            cargo publish -p "$1" 2>&1 || echo "note: $1 may already be published"
            sleep 30
          }
          publish zorto-core
          publish zorto-webapp
          publish zorto-app
          cargo publish -p zorto
