<!DOCTYPE html>
<html lang="{{ config.default_language | default(value='en') }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ section.title }} | {{ config.title }}</title>
    {% if section.description -%}
    <meta name="description" content="{{ section.description }}">
    {%- endif %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/{{ section.extra.reveal_theme | default(value='black') }}.css" id="theme">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
    {%- if config.extra.favicon %}
    <link rel="icon" type="{{ config.extra.favicon_mimetype | default(value='image/png') }}" href="{{ config.extra.favicon }}">
    {%- endif %}
    <style>
        /* Zorto presentation overrides */
        .reveal h1, .reveal h2, .reveal h3, .reveal h4 {
            text-transform: none;
        }
        .reveal .zorto-anchor {
            display: none;
        }
        .reveal .slide-image {
            max-width: none;
        }
        .reveal .slide-columns {
            width: 100%;
            text-align: left;
        }
        .reveal .slide-column ul,
        .reveal .slide-column ol {
            display: block;
        }
        .reveal section.layout-center {
            text-align: center;
        }
        .reveal section.layout-center h1,
        .reveal section.layout-center h2,
        .reveal section.layout-center h3 {
            text-align: center;
        }
        .reveal section.layout-image-left,
        .reveal section.layout-image-right {
            display: flex !important;
            align-items: center;
            gap: 2em;
            text-align: left;
        }
        .reveal section.layout-image-left > *,
        .reveal section.layout-image-right > * {
            flex: 1;
            min-width: 0;
        }
        .reveal section.layout-image-left img,
        .reveal section.layout-image-right img {
            max-width: 100%;
            height: auto;
        }
        .reveal section.layout-image-full {
            text-align: center;
        }
        .reveal section.layout-title {
            text-align: center;
        }
        .reveal section.layout-title h1 {
            font-size: 2.5em;
        }
        .reveal .slides section .fragment {
            transition: all 0.3s ease;
        }
        /* Code block styling */
        .reveal pre {
            width: 100%;
            font-size: 0.55em;
        }
        .reveal code {
            max-height: 500px;
        }
        /* Visualization output inside slides */
        .reveal .code-viz {
            margin: 0.5em auto;
            max-width: 100%;
        }
        .reveal .code-viz img {
            max-height: 420px;
            object-fit: contain;
        }
        .reveal .code-viz .plotly-graph-div,
        .reveal .code-viz .js-plotly-plot {
            max-height: 380px !important;
        }
        /* Overflow safety net: if a slide's content exceeds the 700px box,
           let it scroll within the slide rather than getting clipped. */
        .reveal .slides > section,
        .reveal .slides > section > section {
            overflow-y: auto;
            overflow-x: hidden;
            max-height: 100%;
            scrollbar-width: thin;
            scrollbar-color: rgba(124, 58, 237, 0.4) transparent;
        }
        /* Reveal's `center: true` translates sections to 50% — when content is
           taller than the slide box, the top lands above the viewport and is
           unreachable even with scroll. Pin overflow-prone layouts to the top. */
        .reveal.center .slides section.layout-image-left,
        .reveal.center .slides section.layout-image-right {
            top: 0 !important;
            transform: none !important;
            min-height: 100%;
        }
        .reveal section.layout-image-left,
        .reveal section.layout-image-right {
            padding-top: 0.5em;
        }
        .reveal .slides > section::-webkit-scrollbar { width: 8px; }
        .reveal .slides > section::-webkit-scrollbar-thumb {
            background: rgba(124, 58, 237, 0.4);
            border-radius: 4px;
        }
        /* Tighter spacing + smaller base text so more fits by default */
        .reveal { font-size: 32px; }
        .reveal h1 { font-size: 2em; }
        .reveal h2 { font-size: 1.4em; margin-bottom: 0.35em; }
        .reveal h3 { font-size: 1.15em; }
        .reveal p, .reveal li { font-size: 0.9em; }
        .reveal ul, .reveal ol { line-height: 1.35; }
        .reveal section.layout-title h1 { font-size: 2.2em; }
        /* Logo animations */
        @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }
        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(124, 58, 237, 0)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 24px rgba(124, 58, 237, 0.6)); }
        }
        @keyframes logo-spin-in {
            0% { transform: rotate(-180deg) scale(0); opacity: 0; }
            100% { transform: rotate(0deg) scale(1); opacity: 1; }
        }
        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 4px rgba(124, 58, 237, 0.4)); }
            50% { filter: drop-shadow(0 0 32px rgba(124, 58, 237, 0.9)) drop-shadow(0 0 12px rgba(6, 182, 212, 0.6)); }
        }
        @keyframes logo-sway {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }
        @keyframes logo-fade-in {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .logo-float { animation: logo-float 3.5s ease-in-out infinite; }
        .logo-pulse { animation: logo-pulse 2.5s ease-in-out infinite; }
        .logo-spin-in { animation: logo-spin-in 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        .logo-glow { animation: logo-glow 2.8s ease-in-out infinite; }
        .logo-sway { animation: logo-sway 4s ease-in-out infinite; }
        .logo-fade-in { animation: logo-fade-in 1s ease-out both; }
        .logo-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 72px;
            height: auto;
            opacity: 0.85;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            {%- for page in section.pages %}
            <section
                {%- if page.extra.background_image %} data-background-image="{{ page.extra.background_image }}"{% endif %}
                {%- if page.extra.background_color %} data-background-color="{{ page.extra.background_color }}"{% endif %}
                {%- if page.extra.background_size %} data-background-size="{{ page.extra.background_size }}"{% endif %}
                {%- if page.extra.background_opacity %} data-background-opacity="{{ page.extra.background_opacity }}"{% endif %}
                {%- if page.extra.transition %} data-transition="{{ page.extra.transition }}"{% endif %}
                {%- if page.extra.reveal_theme %} data-reveal-theme="{{ page.extra.reveal_theme }}"{% endif %}
                {%- if page.extra.layout %} class="layout-{{ page.extra.layout }}"{% endif %}
            >
                {{ page.content | safe }}
            </section>
            {%- endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            slideNumber: true,
            width: {{ section.extra.width | default(value=1050) }},
            height: {{ section.extra.height | default(value=700) }},
            margin: {{ section.extra.margin | default(value=0.04) }},
            transition: '{{ section.extra.transition | default(value="slide") }}',
            center: true,
            plugins: [ RevealNotes, RevealHighlight ]
        });
        // Per-slide reveal-theme switching. Set `reveal_theme = "moon"` on a slide's
        // [extra] table to swap the theme stylesheet when that slide is active.
        (function () {
            var themeLink = document.getElementById('theme');
            var defaultHref = themeLink.getAttribute('href');
            function themeUrl(name) {
                return 'https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/' + name + '.css';
            }
            Reveal.on('slidechanged', function (event) {
                var t = event.currentSlide && event.currentSlide.getAttribute('data-reveal-theme');
                themeLink.setAttribute('href', t ? themeUrl(t) : defaultHref);
            });
            // On first load, apply the starting slide's theme if it has one.
            Reveal.on('ready', function () {
                var t = Reveal.getCurrentSlide() && Reveal.getCurrentSlide().getAttribute('data-reveal-theme');
                if (t) themeLink.setAttribute('href', themeUrl(t));
            });
        })();
    </script>
</body>
</html>
